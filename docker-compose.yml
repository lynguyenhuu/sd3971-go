services:
  postgres:
    image: postgres:18-alpine
    container_name: sd3971_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-products_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sd3971_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sd3971_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST:-5432}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-products_db}
      APP_PORT: ${APP_PORT:-8080}
    ports:
      - "8080:8080"
    volumes:
      - ./migrations:/root/migrations:ro
    networks:
      - sd3971_network

volumes:
  postgres_data:

networks:
  sd3971_network:
    driver: bridge
